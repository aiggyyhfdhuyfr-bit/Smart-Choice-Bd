<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4 ফটো প্রিন্টার - Nafiz IT Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600&display=swap');

        :root { font-family: 'Hind Siliguri', sans-serif; }

        .a4 {
            width: 210mm;
            height: 297mm;
            background: white;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            border: 1px solid #ddd;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        @media print {
            body * { visibility: hidden; }
            .a4, .a4 * { visibility: visible; }
            .a4 { 
                position: absolute; left: 0; top: 0; 
                width: 210mm; height: 297mm; 
                margin: 0; box-shadow: none; border: none;
            }
            .no-print { display: none !important; }
        }

        /* Passport Layout */
        .passport-grid {
            display: grid;
            grid-template-columns: repeat(4, 35mm);
            grid-template-rows: repeat(5, 45mm);
            gap: 4mm;
            padding: 10mm 12mm;
            width: 100%; height: 100%;
            box-sizing: border-box;
        }
        .photo-slot {
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f8f8f8;
            position: relative;
            cursor: pointer;
        }
        .photo-slot img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .upload-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .photo-slot:hover .upload-overlay {
            display: flex;
            opacity: 1;
        }
        .upload-overlay span {
            font-size: 18px;
            margin-bottom: 4px;
        }

        /* 16:9 Layout */
        .sixteen-grid {
            display: flex;
            flex-direction: column;
            width: 100%; height: 100%;
            gap: 0;
            padding: 0;
        }
        .sixteen-slot {
            flex: 1;
            width: 100%;
            border: 2px solid #222;
            background: #f9f9f9;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .sixteen-slot img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="bg-indigo-700 text-white py-5 shadow-md no-print">
        <div class="max-w-5xl mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-4xl">📸</span>
                <div>
                    <h1 class="text-3xl font-bold">A4 ফটো প্রিন্টার</h1>
                    <p class="text-sm opacity-90">পাসপোর্ট + ১৬:৯ • Nafiz IT Tool</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-8">

        <!-- Global Upload -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 mb-10 no-print">
            <label id="global-upload" 
                   class="cursor-pointer block border-2 border-dashed border-indigo-300 hover:border-indigo-500 rounded-3xl py-12 text-center transition-all">
                <div class="text-6xl mb-3">📤</div>
                <p class="text-xl font-medium text-indigo-700">নতুন ছবি আপলোড করুন (একাধিক)</p>
                <p class="text-gray-500">সব স্লটে যোগ হবে অথবা প্রতিস্থাপন করতে স্লটে ক্লিক করুন</p>
                <input type="file" id="global-file-input" multiple accept="image/*" class="hidden">
            </label>
        </div>

        <!-- Tabs -->
        <div class="flex mb-6 border-b border-gray-200 no-print">
            <button onclick="switchTab(0)" id="tab-0"
                    class="tab-button flex-1 py-4 font-semibold text-lg border-b-4 border-indigo-600 text-indigo-700">📸 পাসপোর্ট সাইজ (২০টা)</button>
            <button onclick="switchTab(1)" id="tab-1"
                    class="tab-button flex-1 py-4 font-semibold text-lg border-b-4 border-transparent">📺 ১৬:৯ (৩টা ছবি)</button>
        </div>

        <!-- Layouts -->
        <div id="layout-0">
            <div class="a4">
                <div id="passport-grid" class="passport-grid"></div>
            </div>
        </div>

        <div id="layout-1" class="hidden">
            <div class="a4">
                <div id="sixteen-grid" class="sixteen-grid"></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-4 justify-center mt-12 no-print">
            <button onclick="window.print()" 
                    class="flex-1 max-w-xs bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-3xl text-xl font-semibold flex items-center justify-center gap-3 shadow-xl">
                🖨️ প্রিন্ট করুন
            </button>
            <button onclick="downloadPDF()" 
                    class="flex-1 max-w-xs bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-3xl text-xl font-semibold flex items-center justify-center gap-3 shadow-xl">
                📄 PDF ডাউনলোড
            </button>
            <button onclick="downloadWord()" 
                    class="flex-1 max-w-xs bg-orange-600 hover:bg-orange-700 text-white py-5 rounded-3xl text-xl font-semibold flex items-center justify-center gap-3 shadow-xl">
                📝 Word ডাউনলোড
            </button>
        </div>
    </div>

    <script>
        let uploadedImages = new Array(20).fill(null); // 20 slots for passport, first 3 used for 16:9

        function createSlot(index, isPassport = true) {
            const slot = document.createElement('div');
            slot.className = isPassport ? 'photo-slot' : 'sixteen-slot';
            slot.dataset.index = index;

            const img = document.createElement('img');
            if (uploadedImages[index]) {
                img.src = uploadedImages[index];
            }
            slot.appendChild(img);

            // Upload overlay for passport
            if (isPassport) {
                const overlay = document.createElement('div');
                overlay.className = 'upload-overlay';
                overlay.innerHTML = `
                    <span>📤</span>
                    <div>ক্লিক করে ছবি পরিবর্তন করুন</div>
                `;
                slot.appendChild(overlay);
            }

            // Click to upload
            slot.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    if (e.target.files[0]) {
                        const url = URL.createObjectURL(e.target.files[0]);
                        if (uploadedImages[index]) URL.revokeObjectURL(uploadedImages[index]);
                        uploadedImages[index] = url;
                        renderAll();
                    }
                };
                input.click();
            });

            return slot;
        }

        function renderPassport() {
            const grid = document.getElementById('passport-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                grid.appendChild(createSlot(i, true));
            }
        }

        function renderSixteen() {
            const grid = document.getElementById('sixteen-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                grid.appendChild(createSlot(i, false));
            }
        }

        function renderAll() {
            renderPassport();
            renderSixteen();
        }

        function handleGlobalFiles(files) {
            let added = 0;
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/') && added < 20) {
                    const url = URL.createObjectURL(file);
                    // Find first empty slot or replace last
                    let index = uploadedImages.findIndex(img => !img);
                    if (index === -1) index = uploadedImages.length - 1;
                    if (uploadedImages[index]) URL.revokeObjectURL(uploadedImages[index]);
                    uploadedImages[index] = url;
                    added++;
                }
            });
            renderAll();
        }

        function clearAll() {
            uploadedImages.forEach(url => {
                if (url) URL.revokeObjectURL(url);
            });
            uploadedImages = new Array(20).fill(null);
            renderAll();
        }

        function switchTab(tab) {
            document.getElementById('layout-0').classList.toggle('hidden', tab !== 0);
            document.getElementById('layout-1').classList.toggle('hidden', tab !== 1);
            
            document.querySelectorAll('.tab-button').forEach((btn, i) => {
                if (i === tab) {
                    btn.classList.add('border-indigo-600', 'text-indigo-700');
                } else {
                    btn.classList.remove('border-indigo-600', 'text-indigo-700');
                }
            });
        }

        function downloadPDF() {
            const element = document.querySelector('.a4');
            const opt = {
                margin: 0,
                filename: `A4_Photo_${new Date().toISOString().slice(0,10)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function downloadWord() {
            if (uploadedImages.every(img => !img)) {
                alert("প্রথমে অন্তত একটা ছবি আপলোড করুন!");
                return;
            }

            const isPassport = !document.getElementById('layout-0').classList.contains('hidden');
            let htmlContent = `
                <html><head><meta charset="utf-8">
                <style>
                    @page { size: A4; margin: 0; }
                    .a4 { width: 210mm; height: 297mm; page-break-after: always; }
                    img { width: 100%; height: 100%; object-fit: cover; }
                </style></head><body>`;

            if (isPassport) {
                htmlContent += `<div class="a4"><div style="display:grid;grid-template-columns:repeat(4,35mm);grid-template-rows:repeat(5,45mm);gap:4mm;padding:10mm 12mm;height:100%;box-sizing:border-box;">`;
                for (let i = 0; i < 20; i++) {
                    if (uploadedImages[i]) {
                        htmlContent += `<div style="border:2px solid #333;overflow:hidden;"><img src="${uploadedImages[i]}"></div>`;
                    }
                }
                htmlContent += `</div></div>`;
            } else {
                htmlContent += `<div class="a4"><div style="display:flex;flex-direction:column;height:100%;">`;
                for (let i = 0; i < 3; i++) {
                    if (uploadedImages[i]) {
                        htmlContent += `<div style="flex:1;border:2px solid #222;overflow:hidden;"><img src="${uploadedImages[i]}"></div>`;
                    }
                }
                htmlContent += `</div></div>`;
            }
            htmlContent += `</body></html>`;

            const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `A4_Photo_${new Date().toISOString().slice(0,10)}.doc`;
            link.click();
        }

        // Initialize
        window.onload = () => {
            const globalInput = document.getElementById('global-file-input');
            const globalLabel = document.getElementById('global-upload');

            globalLabel.addEventListener('click', () => globalInput.click());
            globalInput.addEventListener('change', (e) => {
                if (e.target.files.length) handleGlobalFiles(e.target.files);
            });

            // Initial render
            renderAll();
        };
    </script>
</body>
</html>
